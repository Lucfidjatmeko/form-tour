<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:'Poppins',sans-serif;padding:12px;color:white}
.wrap{max-width:600px;margin:0 auto}

/* HEADER */
.header{text-align:center;margin-bottom:18px;padding:18px 16px 14px}

.last-update{font-size:10px;color:rgba(255,255,255,0.25);margin-top:7px}

/* CARD */
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;color:rgba(255,255,255,0.5)}

/* SECTION DIVIDER */
.sec-div{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.18);text-align:center;padding:6px 0 8px}

/* STAT 3-col */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{border-radius:12px;padding:11px 6px;text-align:center}
.stat-card .num{font-size:26px;font-weight:900;line-height:1}
.stat-card .lbl{font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-top:4px;opacity:0.6;line-height:1.3}
.s1{background:rgba(59,130,246,0.18);border:1px solid rgba(59,130,246,0.3)}.s1 .num{color:#7ecfff}
.s2{background:rgba(16,185,129,0.18);border:1px solid rgba(16,185,129,0.3)}.s2 .num{color:#6ee7b7}
.s3{background:rgba(247,201,72,0.14);border:1px solid rgba(247,201,72,0.3)}.s3 .num{color:#f7c948}
.s4{background:rgba(168,85,247,0.18);border:1px solid rgba(168,85,247,0.3)}.s4 .num{color:#c084fc}

/* MINI GRID 2-col */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mini-card{border-radius:10px;padding:12px;text-align:center}
.mini-card .mn{font-size:24px;font-weight:900;line-height:1}
.mini-card .ml{font-size:9px;color:rgba(255,255,255,0.45);margin-top:4px;line-height:1.4}
.mini-card .mp{font-size:11px;font-weight:700;margin-top:3px}

.bar-wrap:last-child{margin-bottom:0}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px}
.bar-top .bl{font-size:12px;color:rgba(255,255,255,0.75);flex:1;line-height:1.4}
.bar-top .bv{font-size:12px;font-weight:800;white-space:nowrap;flex-shrink:0}
.bar-track{background:rgba(255,255,255,0.08);border-radius:5px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease}

function hitungKamar(data){
  const keluarga   =data.filter(r=>parseInt(r[9])>1||parseInt(r[10])>0);
  const soloFixed  =data.filter(r=>r[1].trim().toLowerCase()===SOLO_NAME.toLowerCase()&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const sharingPool=data.filter(r=>r[1].trim().toLowerCase()!==SOLO_NAME.toLowerCase()&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const bySection={};
  sharingPool.forEach(r=>{const s=r[3]||"?";if(!bySection[s])bySection[s]=[];bySection[s].push(r);});
  const sharingRooms=[],overflow=[];
  Object.entries(bySection).forEach(([sec,ms])=>{
    let i=0;
    while(i+ROOM_CAPACITY<=ms.length){sharingRooms.push({label:sec,same:true,members:ms.slice(i,i+ROOM_CAPACITY)});i+=ROOM_CAPACITY;}
    while(i<ms.length){overflow.push(ms[i]);i++;}
  });
  for(let i=0;i<overflow.length;i+=ROOM_CAPACITY){
    const chunk=overflow.slice(i,i+ROOM_CAPACITY);
    sharingRooms.push({label:[...new Set(chunk.map(r=>r[3]))].join(" + "),same:false,members:chunk});
  }
  const breakdown={};
  keluarga.forEach(r=>{const d=parseInt(r[9])||1,a=parseInt(r[10])||0,k=`${d} Dewasa${a>0?` + ${a} Anak`:''}`;breakdown[k]=(breakdown[k]||0)+1;});
  return{keluarga,soloFixed,sharingPool,sharingRooms,
    kamarKeluarga:keluarga.length,kamarSolo:soloFixed.length,
    kamarSharing:sharingRooms.length,
    totalKamar:keluarga.length+soloFixed.length+sharingRooms.length,
    kosongSharing:sharingRooms.length*ROOM_CAPACITY-sharingPool.length,breakdown};
}

async function loadData(){
  document.getElementById("content").innerHTML=`<div class="loading"><div class="spinner"></div>Memuat data...</div>`;
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
    const txt=await res.text();
    const json=JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table.rows||[];
    if(!rows||rows.length===0){document.getElementById("content").innerHTML=`<div class="loading">📭 Belum ada data.</div>`;return;}
    render(rows.map(r=>r.c.map(c=>c?(c.f||c.v||"-"):"-")));
    document.getElementById("lastUpdate").textContent="Diperbarui: "+new Date().toLocaleTimeString("id-ID");
  }catch(e){document.getElementById("content").innerHTML=`<div class="loading">❌ Gagal memuat data.</div>`;}
}

          <span style="font-size:20px">👩</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:700">${r[1]}</div><div style="font-size:10px;color:rgba(255,255,255,0.38)">${r[3]}</div></div>
          <span class="badge" style="background:rgba(236,72,153,0.18);border:1px solid rgba(236,72,153,0.3);color:#f9a8d4">1 Kamar</span>
        </div>`).join('')):''}

    <!-- Drill-down: Kamar Sharing -->
    ${acc('km-sharing','kamar-sharing-acc','👥','Kamar Sharing',`${km.kamarSharing} kamar · ${km.sharingPool.length} orang · ${km.kosongSharing} slot kosong`,`
      ${km.sharingRooms.map((room,i)=>{
        const isi=room.members.length,kosong=ROOM_CAPACITY-isi,isFull=kosong===0;
        return `<div class="room-block" style="${!room.same?'border-color:rgba(247,201,72,0.28)':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:6px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:800;color:#a5b4fc">🛏️ Kamar ${i+1}</span>
            <div style="display:flex;gap:5px">
              <span class="badge" style="${!room.same?'background:rgba(247,201,72,0.12);border:1px solid rgba(247,201,72,0.3);color:#f7c948':'background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc'}">${room.same?'1 SECTION':'LINTAS'}</span>
              <span class="badge" style="${isFull?'background:rgba(16,185,129,0.14);border:1px solid rgba(16,185,129,0.28);color:#6ee7b7':'background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.25);color:#f7c948'}">${isi}/${ROOM_CAPACITY}${isFull?' Full':` +${kosong}kosong`}</span>
            </div>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:8px;font-style:italic">${room.label}</div>
          <div class="bar-track" style="margin-bottom:8px;height:5px"><div class="bar-fill" style="width:${pct(isi,ROOM_CAPACITY)}%;background:${isFull?'#6ee7b7':'#a5b4fc'}"></div></div>
          ${room.members.map((r,j)=>`
            <div class="room-person">
              <span style="font-size:10px;color:rgba(255,255,255,0.22);width:16px">${j+1}</span>
              <span style="font-size:12px;font-weight:700;flex:1">${r[1]}</span>
              <span style="font-size:10px;color:rgba(255,255,255,0.32)">${shortSec(r[3])}</span>
            </div>`).join('')}
          ${kosong>0?Array.from({length:kosong},()=>`<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03)"><span style="font-size:11px;color:rgba(255,255,255,0.15);font-style:italic">— slot kosong</span></div>`).join(''):''}
        </div>`;
      }).join('')||'<div class="empty">Belum ada</div>'}
    `)}
  </div>

  <!-- ══ E. KAOS ══ -->
  <div class="sec-div">Kaos</div>

  ${acc('kaos','sec-acc','👕','Ukuran & Model Kaos',`${perLengan["Lengan Pendek"]||0} pendek · ${perLengan["Lengan Panjang"]||0} panjang`,`
    <div class="mini-grid" style="margin-bottom:12px">
      <div class="mini-card" style="background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.22)"><div class="mn" style="color:#fda4af">${perLengan["Lengan Pendek"]||0}</div><div class="ml">Lengan Pendek</div><div class="mp" style="color:#fda4af">${pct(perLengan["Lengan Pendek"]||0,total)}%</div></div>
      <div class="mini-card" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.22)"><div class="mn" style="color:#c084fc">${perLengan["Lengan Panjang"]||0}</div><div class="ml">Lengan Panjang</div><div class="mp" style="color:#c084fc">${pct(perLengan["Lengan Panjang"]||0,total)}%</div></div>
    </div>
    <div class="pill-wrap">
      ${["S","M","L","XL","XXL","3XL","4XL","5XL","6XL"].map(s=>`<div class="pill" style="background:rgba(168,85,247,0.16);border:1px solid rgba(168,85,247,0.3);color:#c084fc">${s} <strong>${perSize[s]||0}</strong></div>`).join('')}
    </div>
    ${Object.entries(perSize).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>`<div class="bar-wrap"><div class="bar-top"><span class="bl">Size ${k}</span><span class="bv" style="color:${CLR[i%CLR.length]}">${v} orang (${pct(v,total)}%)</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(v,maxSize)}%;background:${CLR[i%CLR.length]}"></div></div></div>`).join('')||'<div class="empty">Belum ada</div>'}
  `)}

  <!-- ══ F. DATA PENDAFTAR ══ -->
  <div class="sec-div">Data Pendaftar</div>

  ${acc('all-pendaftar','sec-acc','📋',`Semua Pendaftar`,`${total} orang terdaftar · tap untuk expand`,
    data.map((r,i)=>{
      const km_info=kamarMap[r[1]]||{tipe:'k',lbl:'—'};
      return `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:11px;margin-bottom:7px">
        <div style="font-size:13px;font-weight:800;margin-bottom:7px">${i+1}. ${r[1]}</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:rgba(255,255,255,0.38)">Section</span><span style="font-size:11px;font-weight:600;text-align:right;max-width:60%">${r[3]}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:rgba(255,255,255,0.38)">Tanggal</span><span style="font-size:11px;font-weight:600;color:#f7c948">${r[5]}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:rgba(255,255,255,0.38)">Transport</span><span style="font-size:11px;font-weight:600">${r[28]}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:rgba(255,255,255,0.38)">Kamar</span><span class="badge" style="${bStyle[km_info.tipe]}">${km_info.lbl}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:rgba(255,255,255,0.38)">Kaos</span><span style="font-size:11px;font-weight:600">${r[29]} / ${r[30]}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:rgba(255,255,255,0.38)">Peserta</span><span style="font-size:12px;font-weight:800;color:#f7c948">${r[11]} orang</span></div>
      </div>`;
    }).join('')
  )}

  `;
}

loadData();
</script>
</body>
</html>
