<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tour PPIC & Warehouse 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:'Poppins',sans-serif;padding:20px;color:white}
.wrap{max-width:1100px;margin:0 auto}

/* Header */
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,#f7c948,#ff6b35,#e94560,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:rgba(255,255,255,0.5);font-size:13px;margin-top:4px}
.refresh-btn{margin-top:12px;background:linear-gradient(90deg,#a855f7,#3b82f6);border:none;color:white;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif}
.last-update{font-size:11px;color:rgba(255,255,255,0.3);margin-top:6px}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{border-radius:16px;padding:18px;text-align:center;backdrop-filter:blur(10px)}
.stat-card .num{font-size:36px;font-weight:900;line-height:1}
.stat-card .lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:6px;opacity:0.7}
.s1{background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4)}
.s1 .num{color:#7ecfff}
.s2{background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4)}
.s2 .num{color:#6ee7b7}
.s3{background:rgba(247,201,72,0.15);border:1px solid rgba(247,201,72,0.4)}
.s3 .num{color:#f7c948}
.s4{background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.4)}
.s4 .num{color:#c084fc}
.s5{background:rgba(233,69,96,0.2);border:1px solid rgba(233,69,96,0.4)}
.s5 .num{color:#fda4af}
.s6{background:rgba(255,107,53,0.2);border:1px solid rgba(255,107,53,0.4)}
.s6 .num{color:#ffb347}

/* Section cards */
.section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;margin-bottom:24px}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:20px;backdrop-filter:blur(10px)}
.card-title{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Bar chart */
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:4px}
.bar-track{background:rgba(255,255,255,0.08);border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width 0.8s ease}

/* Pill badges */
.pill-grid{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.1);text-align:left}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}
.tbl tr:last-child td{border-bottom:none}

/* Loading */
.loading{text-align:center;padding:40px;color:rgba(255,255,255,0.4);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:20px;font-style:italic}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🚌 Dashboard Tour PPIC & Warehouse 2026</h1>
    <p>Data realtime dari Google Sheets</p>
    <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
    <div class="last-update" id="lastUpdate">—</div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Memuat data...
    </div>
  </div>

</div>

<script>
const SHEET_ID = "1uy7Oa5iPPdNgoe85Dr4EqprhPBODZoXTkBEaogxpvMo";
const API = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

async function loadData() {
  document.getElementById("content").innerHTML = `<div class="loading"><div class="spinner"></div>Memuat data...</div>`;
  try {
    const res = await fetch(API);
    const txt = await res.text();
    const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    if (!rows || rows.length === 0) {
      document.getElementById("content").innerHTML = `<div class="loading">📭 Belum ada data pendaftaran.</div>`;
      return;
    }
    // Ambil semua rows tanpa skip header (header sudah di cols)
    const data = rows.map(r => r.c.map(c => c ? (c.f || c.v || "-") : "-"));
    render(data);
    document.getElementById("lastUpdate").textContent = "Terakhir diperbarui: " + new Date().toLocaleTimeString("id-ID");
  } catch(e) {
    document.getElementById("content").innerHTML = `<div class="loading">❌ Gagal memuat data. Pastikan Sheet sudah dibagikan ke publik.</div>`;
  }
}

function count(arr){ const m={}; arr.forEach(v=>{ m[v]=(m[v]||0)+1; }); return m; }
function sum(arr){ return arr.reduce((a,b)=>a+(parseFloat(b)||0),0); }

function render(data) {
  // Kolom: 0=Timestamp,1=Nama,2=NIK,3=Section,4=NoHP,5=Tanggal,6=Kehadiran,
  // 7=JmlIstri,8=NamaIstri,9=TotalDewasa,10=TotalAnak,11=TotalPeserta,
  // 12..27=Anak1-8(nama+usia), 28=Transportasi, 29=ModelLengan, 30=UkuranKaos, 31=Catatan

  const total = data.length;
  const totalPeserta = sum(data.map(r => r[11]));
  const totalDewasa = sum(data.map(r => r[9]));
  const totalAnak = sum(data.map(r => r[10]));
  const totalBus = data.filter(r => r[28]==="Ikut Bus Panitia").length;
  const totalMobil = data.filter(r => r[28]==="Kendaraan Sendiri").length;

  // Per tanggal
  const perTanggal = count(data.map(r => r[5]));
  // Per section
  const perSection = count(data.map(r => r[3]));
  // Per kehadiran
  const perKehadiran = count(data.map(r => r[6]));
  // Ukuran kaos
  const perSize = count(data.map(r => r[30]));
  // Model lengan
  const perLengan = count(data.map(r => r[29]));
  // Usia anak
  const usiaAnak = [];
  data.forEach(r => {
    for(let i=0;i<8;i++){
      const nama = r[12+i*2];
      const usia = parseInt(r[13+i*2]);
      if(nama && nama!=="-" && !isNaN(usia)) usiaAnak.push(usia);
    }
  });
  const usiaBucket = {"0-5":0,"6-12":0,"13-17":0,"18+":0};
  usiaAnak.forEach(u => {
    if(u<=5) usiaBucket["0-5"]++;
    else if(u<=12) usiaBucket["6-12"]++;
    else if(u<=17) usiaBucket["13-17"]++;
    else usiaBucket["18+"]++;
  });

  const maxSection = Math.max(...Object.values(perSection), 1);
  const maxTanggal = Math.max(...Object.values(perTanggal), 1);
  const maxSize = Math.max(...Object.values(perSize), 1);

  const colors = ["#7ecfff","#6ee7b7","#f7c948","#c084fc","#fda4af","#ffb347","#60a5fa","#a78bfa"];

  document.getElementById("content").innerHTML = `

    <!-- Stat Cards -->
    <div class="stat-grid">
      <div class="stat-card s1"><div class="num">${total}</div><div class="lbl">Karyawan Daftar</div></div>
      <div class="stat-card s2"><div class="num">${totalPeserta}</div><div class="lbl">Total Peserta</div></div>
      <div class="stat-card s3"><div class="num">${totalDewasa}</div><div class="lbl">Total Dewasa</div></div>
      <div class="stat-card s4"><div class="num">${totalAnak}</div><div class="lbl">Total Anak</div></div>
      <div class="stat-card s5"><div class="num">${totalBus}</div><div class="lbl">Ikut Bus</div></div>
      <div class="stat-card s6"><div class="num">${totalMobil}</div><div class="lbl">Kendaraan Sendiri</div></div>
    </div>

    <div class="section-grid">

      <!-- Per Tanggal -->
      <div class="card">
        <div class="card-title" style="color:#f7c948">📅 Peserta per Tanggal</div>
        ${Object.entries(perTanggal).map(([k,v],i) => `
          <div class="bar-row">
            <div class="bar-label"><span>${k}</span><span>${v} orang</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${v/maxTanggal*100}%;background:${colors[i%colors.length]}"></div></div>
          </div>`).join("") || '<div class="empty">Belum ada data</div>'}
      </div>

      <!-- Per Kehadiran -->
      <div class="card">
        <div class="card-title" style="color:#6ee7b7">🎫 Tipe Kehadiran</div>
        ${Object.entries(perKehadiran).map(([k,v],i) => `
          <div class="bar-row">
            <div class="bar-label"><span>${k}</span><span>${v} orang (${Math.round(v/total*100)}%)</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${v/total*100}%;background:${colors[i%colors.length]}"></div></div>
          </div>`).join("") || '<div class="empty">Belum ada data</div>'}
      </div>

      <!-- Per Section -->
      <div class="card" style="grid-column:1/-1">
        <div class="card-title" style="color:#7ecfff">🏢 Pendaftaran per Section</div>
        ${Object.entries(perSection).sort((a,b)=>b[1]-a[1]).map(([k,v],i) => `
          <div class="bar-row">
            <div class="bar-label"><span>${k}</span><span>${v} orang</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${v/maxSection*100}%;background:${colors[i%colors.length]}"></div></div>
          </div>`).join("") || '<div class="empty">Belum ada data</div>'}
      </div>

      <!-- Ukuran Kaos -->
      <div class="card">
        <div class="card-title" style="color:#c084fc">👕 Ukuran Kaos</div>
        <div class="pill-grid" style="margin-bottom:16px">
          ${["S","M","L","XL","XXL","3XL","4XL","5XL","6XL"].map((s,i) => `
            <div class="pill" style="background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.4);color:#c084fc">
              ${s}: <strong>${perSize[s]||0}</strong>
            </div>`).join("")}
        </div>
        ${Object.entries(perSize).sort((a,b)=>b[1]-a[1]).map(([k,v],i) => `
          <div class="bar-row">
            <div class="bar-label"><span>Size ${k}</span><span>${v} orang</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${v/maxSize*100}%;background:${colors[i%colors.length]}"></div></div>
          </div>`).join("") || '<div class="empty">Belum ada data</div>'}
      </div>

      <!-- Model Lengan -->
      <div class="card">
        <div class="card-title" style="color:#fda4af">🧥 Model Lengan</div>
        <div style="display:flex;gap:12px;margin-bottom:16px">
          <div style="flex:1;text-align:center;background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);border-radius:12px;padding:16px">
            <div style="font-size:28px;font-weight:900;color:#fda4af">${perLengan["Lengan Pendek"]||0}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px">👕 Lengan Pendek</div>
          </div>
          <div style="flex:1;text-align:center;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);border-radius:12px;padding:16px">
            <div style="font-size:28px;font-weight:900;color:#c084fc">${perLengan["Lengan Panjang"]||0}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px">🧥 Lengan Panjang</div>
          </div>
        </div>
      </div>

      <!-- Usia Anak -->
      <div class="card">
        <div class="card-title" style="color:#ffb347">👶 Rekap Usia Anak</div>
        ${totalAnak===0 ? '<div class="empty">Belum ada data anak</div>' :
          Object.entries(usiaBucket).map(([k,v],i) => `
            <div class="bar-row">
              <div class="bar-label"><span>Usia ${k} th</span><span>${v} anak</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${totalAnak>0?v/totalAnak*100:0}%;background:${colors[i%colors.length]}"></div></div>
            </div>`).join("")}
      </div>

      <!-- Tabel Data -->
      <div class="card" style="grid-column:1/-1;overflow-x:auto">
        <div class="card-title" style="color:#6ee7b7">📋 Data Pendaftar</div>
        <table class="tbl">
          <thead>
            <tr>
              <th>#</th>
              <th>Nama</th>
              <th>Section</th>
              <th>Tanggal</th>
              <th>Kehadiran</th>
              <th>Transportasi</th>
              <th>Kaos</th>
              <th>Total Peserta</th>
            </tr>
          </thead>
          <tbody>
            ${data.map((r,i) => `
              <tr>
                <td style="color:rgba(255,255,255,0.4)">${i+1}</td>
                <td style="font-weight:700">${r[1]}</td>
                <td style="font-size:11px;color:rgba(255,255,255,0.6)">${r[3]}</td>
                <td style="color:#f7c948;font-size:11px">${r[5]}</td>
                <td><span style="background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.3);padding:2px 8px;border-radius:10px;font-size:11px;color:#6ee7b7">${r[6]}</span></td>
                <td style="font-size:11px">${r[28]}</td>
                <td style="font-size:11px">${r[29]} / ${r[30]}</td>
                <td style="text-align:center;font-weight:700;color:#f7c948">${r[11]}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>

    </div>
  `;
}

loadData();
</script>
</body>
</html>
