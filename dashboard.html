.last-update{font-size:10px;color:rgba(255,255,255,0.2);margin-top:6px}

.card-title{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;color:rgba(255,255,255,0.4)}

.top-area{display:flex;gap:10px;align-items:stretch;margin-bottom:10px}
.ring-box{flex:0 0 90px;background:rgba(16,185,129,0.09);border:1px solid rgba(16,185,129,0.2);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;position:relative}

.ring-lbl{font-size:9px;color:rgba(255,255,255,0.3);margin-top:3px}
.stat-grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sc{border-radius:10px;padding:9px 5px;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative}
.sc:active{transform:scale(.96)}
.sc.active{outline:2px solid white;outline-offset:1px}
.sc .sn{font-size:20px;font-weight:900;line-height:1}
.sc .sl{font-size:8px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-top:3px;opacity:.55;line-height:1.3}
.sc .sa{font-size:8px;position:absolute;bottom:4px;right:5px;opacity:.35}

.c2{background:rgba(16,185,129,0.18);border:1px solid rgba(16,185,129,0.3)}.c2 .sn{color:#6ee7b7}

function hitungKamar(data){
  const keluarga=data.filter(r=>parseInt(r[9])>1||parseInt(r[10])>0);
  const soloFixed=data.filter(r=>r[1].trim().toLowerCase()===SOLO&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const sharingPool=data.filter(r=>r[1].trim().toLowerCase()!==SOLO&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const bySection={};
  sharingPool.forEach(r=>{const s=r[3]||"?";if(!bySection[s])bySection[s]=[];bySection[s].push(r);});
  const sharingRooms=[],overflow=[];
  Object.entries(bySection).forEach(([,ms])=>{let i=0;while(i+ROOM_CAP<=ms.length){sharingRooms.push({label:ms[0][3],same:true,members:ms.slice(i,i+ROOM_CAP)});i+=ROOM_CAP;}while(i<ms.length){overflow.push(ms[i]);i++;}});
  for(let i=0;i<overflow.length;i+=ROOM_CAP){const ch=overflow.slice(i,i+ROOM_CAP);sharingRooms.push({label:[...new Set(ch.map(r=>r[3]))].join(" + "),same:false,members:ch});}
  const breakdown={};
  keluarga.forEach(r=>{const d=parseInt(r[9])||1,a=parseInt(r[10])||0,k=`${d} Dws${a>0?` + ${a} Anak`:''}`;breakdown[k]=(breakdown[k]||0)+1;});
  return{keluarga,soloFixed,sharingPool,sharingRooms,kamarKeluarga:keluarga.length,kamarSolo:soloFixed.length,kamarSharing:sharingRooms.length,totalKamar:keluarga.length+soloFixed.length+sharingRooms.length,kosongSharing:sharingRooms.length*ROOM_CAP-sharingPool.length,breakdown};
}

function tog(id){
  const b=document.getElementById('b-'+id),h=document.getElementById('h-'+id);
  const o=b.classList.contains('open');
  b.classList.toggle('open',!o);h.classList.toggle('open',!o);
}

let activeDrill='';
function drill(key){
  const panel=document.getElementById('drillPanel');
  if(activeDrill===key){activeDrill='';panel.classList.remove('show');document.querySelectorAll('.sc').forEach(c=>c.classList.remove('active'));return;}
  activeDrill=key;
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('sc-'+key);
  if(el)el.classList.add('active');
  const cfg=window._drillCfg;
  if(!cfg||!cfg[key])return;
  const {title,color,html}=cfg[key];
  panel.innerHTML=`<div class="drill-head"><span class="drill-title" style="color:${color}">${title}</span><button class="drill-close" onclick="closeDrill()">×</button></div><div class="drill-body">${html}</div>`;
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeDrill(){activeDrill='';document.getElementById('drillPanel').classList.remove('show');document.querySelectorAll('.sc').forEach(c=>c.classList.remove('active'));}

async function loadData(){
  document.getElementById("content").innerHTML=`<div class="loading"><div class="spinner"></div>Memuat data...</div>`;
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
    const txt=await res.text();
    const json=JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table.rows||[];
    if(!rows.length){document.getElementById("content").innerHTML=`<div class="loading">📭 Belum ada data.</div>`;return;}
    render(rows.map(r=>r.c.map(c=>c?(c.f||c.v||"-"):"-")));
    document.getElementById("lastUpdate").textContent="Diperbarui: "+new Date().toLocaleTimeString("id-ID");
  }catch(e){document.getElementById("content").innerHTML=`<div class="loading">❌ Gagal memuat data.</div>`;}
}

function render(data){

  const naikBus=dataIkut.filter(r=>r[28]==="Ikut Bus Panitia").length;
  const pesertaBus=sum(dataIkut.filter(r=>r[28]==="Ikut Bus Panitia").map(r=>parseInt(r[11])||1));

    ${Array.from({length:busCount},(_,i)=>{const t=i<Math.floor(pesertaBus/BUS_CAP)?BUS_CAP:(pesertaBus%BUS_CAP||BUS_CAP);return`
      <div class="bar-wrap"><div class="bar-top"><span class="bl">🚌 Bus ${i+1}</span><span class="bv" style="color:#7ecfff">${t}/${BUS_CAP}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct(t,BUS_CAP)}%;background:linear-gradient(90deg,#3b82f6,#6ee7b7)"></div></div></div>`;}).join('')}
    <div class="divider"></div>
    <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Pilihan Tanggal</div>
    ${Object.entries(perTanggal).map(([k,v],i)=>`<div class="bar-wrap"><div class="bar-top"><span class="bl">${k.replace('2026','').trim()}</span><span class="bv" style="color:${CLR[i]}">${v} · ${pct(v,total)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(v,Math.max(...Object.values(perTanggal)))}%;background:${CLR[i]}"></div></div></div>`).join('') || '<div class="empty">Belum ada</div>'}
    <div class="divider"></div>
    <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Tipe Kehadiran</div>
    ${Object.entries(perKehadiran).map(([k,v],i)=>`<div class="bar-wrap"><div class="bar-top"><span class="bl">${k}</span><span class="bv" style="color:${CLR[i+3]}">${v} · ${pct(v,total)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(v,total)}%;background:${CLR[i+3]}"></div></div></div>`).join('') || '<div class="empty">Belum ada</div>'}
  `,true)}

  <!-- AKOMODASI -->
  <div class="sec-div">Akomodasi</div>
  <div class="card" style="background:rgba(20,184,166,0.07);border-color:rgba(20,184,166,0.2)">
    <div class="card-title" style="color:#2dd4bf">🛏️ Kebutuhan Kamar Hotel</div>
    <div class="m2" style="margin-bottom:10px">
      <div class="mc" style="background:rgba(20,184,166,0.16);border:1px solid rgba(20,184,166,0.25)"><div class="mn" style="color:#2dd4bf">${km.totalKamar}</div><div class="ml">Total Kamar</div></div>
      <div class="mc" style="background:rgba(251,146,60,0.14);border:1px solid rgba(251,146,60,0.25)"><div class="mn" style="color:#fb923c">${km.kamarKeluarga}</div><div class="ml">Keluarga · ${pct(km.kamarKeluarga,km.totalKamar)}%</div></div>
      <div class="mc" style="background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.22)"><div class="mn" style="color:#f9a8d4">${km.kamarSolo}</div><div class="ml">Solo · ${pct(km.kamarSolo,km.totalKamar)}%</div></div>
      <div class="mc" style="background:rgba(99,102,241,0.14);border:1px solid rgba(99,102,241,0.25)"><div class="mn" style="color:#a5b4fc">${km.kamarSharing}</div><div class="ml">Sharing · ${pct(km.kamarSharing,km.totalKamar)}%</div></div>
    </div>
    <div style="height:10px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:14px">
      <div style="width:${pct(km.kamarKeluarga,km.totalKamar)}%;background:#f97316"></div>
      <div style="width:${pct(km.kamarSolo,km.totalKamar)}%;background:#db2777"></div>
      <div style="width:${pct(km.kamarSharing,km.totalKamar)}%;background:#6366f1"></div>
    </div>
    ${acc('km-k','km-k-acc','👨‍👩‍👧','Kamar Keluarga',`${km.kamarKeluarga} kamar`,`
      ${Object.entries(km.breakdown).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-wrap"><div class="bar-top"><span class="bl">${k}</span><span class="bv" style="color:#fb923c">${v}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(v,km.kamarKeluarga)}%;background:#fb923c"></div></div></div>`).join('')||'<div class="empty">Belum ada</div>'}
      <div class="divider"></div>
      ${km.keluarga.map((r,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="font-size:10px;color:rgba(255,255,255,0.2);width:18px">${i+1}</span>
          <div style="flex:1"><div style="font-size:12px;font-weight:700">${r[1]}</div><div style="font-size:10px;color:rgba(255,255,255,0.38)">${shortSec(r[3])}</div></div>
          <span class="badge" style="background:rgba(251,146,60,0.18);border:1px solid rgba(251,146,60,0.3);color:#fb923c">${r[9]} dws · ${r[10]} anak</span>
        </div>`).join('')||'<div class="empty">Belum ada</div>'}`)}
    ${km.kamarSolo>0?acc('km-s','km-s-acc','👩','Kamar Solo',`${km.kamarSolo} kamar · wanita tanpa keluarga`,km.soloFixed.map(r=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px;background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.15);border-radius:8px">
        <span style="font-size:18px">👩</span>
        <div style="flex:1"><div style="font-size:12px;font-weight:700">${r[1]}</div><div style="font-size:10px;color:rgba(255,255,255,0.38)">${r[3]}</div></div>
      </div>`).join('')):''}
    ${acc('km-sh','km-sh-acc','👥','Kamar Sharing',`${km.kamarSharing} kamar · ${km.kosongSharing} slot kosong`,
      km.sharingRooms.map((room,i)=>{
        const isi=room.members.length,kosong=ROOM_CAP-isi,isFull=kosong===0;
        return`<div class="room-block" style="${!room.same?'border-color:rgba(247,201,72,0.28)':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:5px">
            <span style="font-size:12px;font-weight:800;color:#a5b4fc">🛏️ Kamar ${i+1}</span>
            <div style="display:flex;gap:4px">
              <span class="badge" style="${!room.same?'background:rgba(247,201,72,0.12);border:1px solid rgba(247,201,72,0.3);color:#f7c948':'background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc'}">${room.same?'1 SECTION':'LINTAS'}</span>
              <span class="badge" style="${isFull?'background:rgba(16,185,129,0.14);border:1px solid rgba(16,185,129,0.28);color:#6ee7b7':'background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.25);color:#f7c948'}">${isi}/${ROOM_CAP}${isFull?' Full':` · ${kosong} kosong`}</span>
            </div>
          </div>
          <div style="font-size:9px;color:rgba(255,255,255,0.25);margin-bottom:6px;font-style:italic">${room.label}</div>
          <div class="bar-track" style="margin-bottom:7px;height:4px"><div class="bar-fill" style="width:${pct(isi,ROOM_CAP)}%;background:${isFull?'#6ee7b7':'#a5b4fc'}"></div></div>
          ${room.members.map((r,j)=>`<div class="room-person"><span style="font-size:10px;color:rgba(255,255,255,0.2);width:14px">${j+1}</span><span style="font-size:12px;font-weight:700;flex:1">${r[1]}</span><span style="font-size:10px;color:rgba(255,255,255,0.3)">${shortSec(r[3])}</span></div>`).join('')}
          ${kosong>0?Array.from({length:kosong},()=>`<div style="padding:3px 0"><span style="font-size:10px;color:rgba(255,255,255,0.13);font-style:italic">— slot kosong</span></div>`).join(''):''}
        </div>`;}).join('')||'<div class="empty">Belum ada</div>')}
  </div>

  <!-- KAOS -->
  <div class="sec-div">Kaos</div>
  ${acc('kaos','sec-acc','👕','Ukuran & Model Kaos',`${perLengan["Lengan Pendek"]||0} pendek · ${perLengan["Lengan Panjang"]||0} panjang`,`
    <div class="m2" style="margin-bottom:12px">
      <div class="mc" style="background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.22)"><div class="mn" style="color:#fda4af">${perLengan["Lengan Pendek"]||0}</div><div class="ml">Lengan Pendek · ${pct(perLengan["Lengan Pendek"]||0,total)}%</div></div>
      <div class="mc" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.22)"><div class="mn" style="color:#c084fc">${perLengan["Lengan Panjang"]||0}</div><div class="ml">Lengan Panjang · ${pct(perLengan["Lengan Panjang"]||0,total)}%</div></div>
    </div>
    <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Detail per Lengan + Ukuran</div>
    ${(()=>{const mx=Math.max(...Object.values(perKaos),1);return Object.entries(perKaos).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>`
      <div class="bar-wrap"><div class="bar-top"><span class="bl">${k}</span><span class="bv" style="color:${CLR[i%CLR.length]}">${v} <span style="opacity:.6;font-size:10px">(${pct(v,total)}%)</span></span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct(v,mx)}%;background:${CLR[i%CLR.length]}"></div></div></div>`).join('')||'<div class="empty">Belum ada</div>';})()}`)}

  <!-- SEMUA PENDAFTAR -->
  <div class="sec-div">Data Pendaftar</div>
  ${acc('all','sec-acc','📋','Semua Pendaftar',`${data.length} orang · tap untuk expand`,
    data.map((r,i)=>{
      const isIkut=!r[32]||r[32]==="Ya"||r[32]==="";
      const ki=kamarMap[r[1]]||{tipe:'k',lbl:'—'};
      return`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,${isIkut?'0.07':'0.04'});border-radius:9px;padding:10px;margin-bottom:7px${!isIkut?';opacity:.55':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:13px;font-weight:800">${i+1}. ${r[1]}</div>
          <span class="badge" style="${isIkut?'background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7':'background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);color:#fda4af'}">${isIkut?'Ikut':'Tidak'}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px">
          <div style="font-size:10px;color:rgba(255,255,255,0.35)">${shortSec(r[3])}</div>
          <div style="font-size:10px;color:#f7c948;font-weight:700">${r[5].replace('2026','').trim()}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.45)">${r[28]==='Ikut Bus Panitia'?'🚌 Bus':'🚗 Sendiri'}</div>
          <div style="font-size:10px;font-weight:800;color:#f7c948">${r[11]} orang</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.45)">${kaosLabel(r)}</div>
          <span class="badge" style="${bStyle[ki.tipe]};font-size:9px">${ki.lbl}</span>
        </div>
      </div>`;}).join(''))}
  `;
}
loadData();
</script>
</body>
</html>
