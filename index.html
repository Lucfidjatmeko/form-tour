<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran Tour PPIC & Warehouse 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:'Poppins',sans-serif;padding:16px;color:white}
.wrap{max-width:520px;margin:0 auto;padding-bottom:40px}

/* HEADER */
.header{text-align:center;padding:24px 16px 20px}
.header h1{font-size:20px;font-weight:900;line-height:1.3;background:linear-gradient(135deg,#f7c948,#ff6b35,#e94560,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:rgba(255,255,255,0.4);font-size:12px;margin-top:6px}

/* CARD */
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px}

/* NIK LOOKUP */
.nik-wrap{position:relative}
.nik-input{width:100%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 52px 14px 16px;font-size:20px;font-weight:800;color:white;font-family:'Poppins',sans-serif;letter-spacing:2px;text-align:center;outline:none;transition:border .2s}
.nik-input:focus{border-color:rgba(168,85,247,0.6);background:rgba(168,85,247,0.1)}
.nik-input::placeholder{font-size:14px;font-weight:400;letter-spacing:0;color:rgba(255,255,255,0.3)}
.nik-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:linear-gradient(90deg,#a855f7,#3b82f6);border:none;color:white;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.nik-status{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;display:none}
.nik-status.found{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;display:block}
.nik-status.notfound{background:rgba(233,69,96,0.12);border:1px solid rgba(233,69,96,0.3);color:#fda4af;display:block}
.nik-status.revisi{background:rgba(247,201,72,0.12);border:1px solid rgba(247,201,72,0.3);color:#f7c948;display:block}
.nik-status.error{background:rgba(233,69,96,0.12);border:1px solid rgba(233,69,96,0.3);color:#fda4af;display:block}

/* IDENTITY CARD */
.identity{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:12px;padding:14px 16px;margin-top:12px;display:none}
.identity.show{display:block}
.id-name{font-size:17px;font-weight:900;color:white;margin-bottom:4px}
.id-sec{font-size:11px;color:rgba(168,85,247,0.9);font-weight:700}
.id-nik{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}

/* FORM FIELDS */
.form-body{display:none}
.form-body.show{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.field label .req{color:#fda4af}
.inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px 14px;font-size:14px;color:white;font-family:'Poppins',sans-serif;outline:none;transition:border .2s;-webkit-appearance:none}
.inp:focus{border-color:rgba(168,85,247,0.5);background:rgba(168,85,247,0.08)}
.inp::placeholder{color:rgba(255,255,255,0.25)}
select.inp option{background:#302b63;color:white}
.inp[readonly]{opacity:0.5;cursor:not-allowed}

/* RADIO GROUP */
.radio-group{display:flex;flex-wrap:wrap;gap:8px}
.radio-group label{flex:1;min-width:calc(50% - 4px)}
.radio-group input[type=radio]{display:none}
.radio-group input[type=radio]+span{display:block;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;transition:all .15s;color:rgba(255,255,255,0.6)}
.radio-group input[type=radio]:checked+span{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.5);color:#c084fc}

/* ANAK SECTION */
.anak-wrap{display:none}
.anak-wrap.show{display:block}
.anak-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;margin-bottom:8px}
.anak-item-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.anak-row{display:grid;grid-template-columns:1fr 80px;gap:8px}

/* COUNTER */
.counter-wrap{display:flex;align-items:center;gap:10px}
.counter-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;flex-shrink:0}
.counter-val{font-size:20px;font-weight:900;color:white;min-width:30px;text-align:center}

/* SUBMIT */
.submit-btn{width:100%;background:linear-gradient(90deg,#a855f7,#3b82f6);border:none;color:white;padding:16px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Poppins',sans-serif;margin-top:6px;transition:opacity .2s}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.submit-btn:active{opacity:.85}

/* SUCCESS */
.success-screen{display:none;text-align:center;padding:40px 20px}
.success-screen.show{display:block}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:900;color:#6ee7b7;margin-bottom:8px}
.success-sub{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.6}
.back-btn{margin-top:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif}

/* LOADING OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(15,12,41,0.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:99}
.overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay p{font-size:13px;color:rgba(255,255,255,0.5)}

.divider{height:1px;background:rgba(255,255,255,0.08);margin:14px 0}
</style>

<div class="overlay" id="overlay">

    </div>

    <!-- STEP 2: FORM DATA -->
    <div class="form-body" id="formBody">

      <!-- DATA PRIBADI -->
      <div class="card">
        <div class="card-title">👤 Data Pribadi</div>

        <div class="field">
          <label>No. HP / WhatsApp <span class="req">*</span></label>
          <input class="inp" type="tel" id="noHp" placeholder="08xxxxxxxxxx">
        </div>

        <div class="field">
          <label>Nama Istri / Pasangan</label>

        </div>
      </div>

      <!-- TANGGAL & KEHADIRAN -->
      <div class="card">
        <div class="card-title">📅 Tour</div>

        <div class="field">
          <label>Pilihan Tanggal Tour <span class="req">*</span></label>
          <select class="inp" id="tanggal">
            <option value="">— Pilih Tanggal —</option>
            <option>Sabtu, 17 Mei 2025</option>
            <option>Minggu, 18 Mei 2025</option>
          </select>
        </div>

        <div class="field">
          <label>Kehadiran <span class="req">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="kehadiran" value="Hadir Penuh"><span>Hadir Penuh</span></label>
            <label><input type="radio" name="kehadiran" value="Hadir Sebagian"><span>Hadir Sebagian</span></label>
          </div>
        </div>
      </div>

      <!-- PESERTA -->
      <div class="card">
        <div class="card-title">👨‍👩‍👧‍👦 Jumlah Peserta</div>

        <div class="field">
          <label>Jumlah Anak yang Dibawa</label>
          <div class="counter-wrap">
            <button class="counter-btn" onclick="changeAnak(-1)">−</button>
            <div class="counter-val" id="anakCount">0</div>
            <button class="counter-btn" onclick="changeAnak(1)">+</button>
            <span style="font-size:11px;color:rgba(255,255,255,0.35);margin-left:4px">max 8</span>
          </div>
        </div>

        <!-- FORM ANAK DINAMIS -->
        <div class="anak-wrap" id="anakWrap">
          <div class="divider"></div>
          <div id="anakFields"></div>
        </div>
      </div>

      <!-- TRANSPORTASI -->
      <div class="card">
        <div class="card-title">🚌 Transportasi</div>
        <div class="field">
          <label>Pilihan Transportasi <span class="req">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="transportasi" value="Ikut Bus Panitia"><span>🚌 Bus Panitia</span></label>
            <label><input type="radio" name="transportasi" value="Kendaraan Sendiri"><span>🚗 Kendaraan Sendiri</span></label>
          </div>
        </div>
      </div>

      <!-- KAOS -->
      <div class="card">
        <div class="card-title">👕 Kaos</div>
        <div class="field">
          <label>Model Lengan <span class="req">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="lengan" value="Lengan Pendek"><span>Lengan Pendek</span></label>
            <label><input type="radio" name="lengan" value="Lengan Panjang"><span>Lengan Panjang</span></label>
          </div>
        </div>
        <div class="field">
          <label>Ukuran Kaos <span class="req">*</span></label>
          <select class="inp" id="ukuranKaos">
            <option value="">— Pilih Ukuran —</option>
            <option>S</option><option>M</option><option>L</option>
            <option>XL</option><option>XXL</option><option>3XL</option>
            <option>4XL</option><option>5XL</option><option>6XL</option>
          </select>
        </div>
      </div>

      <!-- CATATAN -->
      <div class="card">
        <div class="card-title">📝 Catatan (Opsional)</div>
        <div class="field">
          <textarea class="inp" id="catatan" rows="3" placeholder="Kebutuhan khusus, alergi, dll..."></textarea>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitForm()">
        💾 Simpan Pendaftaran

    </div><!-- /form-body -->
  </div><!-- /mainForm -->
</div>

  const nik = normNik(raw);
  if (!nik || nik.length < 5) {
    showNikStatus('error', '⚠️ NIK minimal 5 digit');
    return;
  }

  // Cari di master list
  const found = MASTER.find(k => normNik(k.noreg) === nik);
  if (!found) {
    showNikStatus('notfound', '❌ NIK tidak ditemukan. Hubungi panitia.');
    hideForm();
    return;
  }

  currentKaryawan = found;

  // Tampilkan identity card
  document.getElementById('idName').textContent    = found.name;
  document.getElementById('idSection').textContent = found.sec;
  document.getElementById('idNik').textContent     = 'NIK: ' + found.noreg;
  document.getElementById('identityCard').classList.add('show');

  showNikStatus('found', `✅ NIK valid. Silakan isi form pendaftaran di bawah.`);
  showForm(null);
}

function showNikStatus(type, msg) {
  const el = document.getElementById('nikStatus');
  el.className = 'nik-status ' + type;
  el.textContent = msg;
}

// ── SHOW/HIDE FORM ────────────────────────────────────────────────────────
function showForm(existing) {
  document.getElementById('formBody').classList.add('show');
  if (existing) fillForm(existing);
  document.getElementById('formBody').scrollIntoView({behavior:'smooth', block:'start'});
}

function hideForm() {
  document.getElementById('formBody').classList.remove('show');
  document.getElementById('identityCard').classList.remove('show');
}

function fillForm(d) {
  if (!d) return;
  setVal('noHp', d.noHp);
  setVal('namaIstri', d.namaIstri);
  setVal('tanggal', d.tanggal);
  setVal('ukuranKaos', d.ukuranKaos);
  setVal('catatan', d.catatan);
  setRadio('kehadiran', d.kehadiran);
  setRadio('transportasi', d.transportasi);
  setRadio('lengan', d.modelLengan);
  // Anak
  const n = d.anak ? d.anak.length : 0;
  anakCount = 0;
  document.getElementById('anakCount').textContent = 0;
  for (let i = 0; i < n; i++) changeAnak(1);
  d.anak && d.anak.forEach((a, i) => {
    setVal(`anak_nama_${i}`, a.nama);
    setVal(`anak_usia_${i}`, a.usia);
  });
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el && val) el.value = val;
}

function setRadio(name, val) {
  const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
  if (el) el.checked = true;
}

// ── ANAK COUNTER ──────────────────────────────────────────────────────────
function changeAnak(delta) {
  anakCount = Math.max(0, Math.min(8, anakCount + delta));
  document.getElementById('anakCount').textContent = anakCount;
  const wrap = document.getElementById('anakWrap');
  wrap.classList.toggle('show', anakCount > 0);
  renderAnakFields();
}

function renderAnakFields() {
  const container = document.getElementById('anakFields');
  let html = '';
  for (let i = 0; i < anakCount; i++) {
    html += `
      <div class="anak-item">
        <div class="anak-item-title">Anak ${i+1}</div>
        <div class="anak-row">
          <div><input class="inp" type="text" id="anak_nama_${i}" placeholder="Nama anak"></div>
          <div><input class="inp" type="number" id="anak_usia_${i}" placeholder="Usia" min="0" max="17"></div>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

// ── SUBMIT ────────────────────────────────────────────────────────────────
async function submitForm() {
  if (!currentKaryawan) return;

  // Validasi wajib
  const noHp       = document.getElementById('noHp').value.trim();
  const tanggal    = document.getElementById('tanggal').value;
  const kehadiran  = document.querySelector('input[name="kehadiran"]:checked');
  const transport  = document.querySelector('input[name="transportasi"]:checked');
  const lengan     = document.querySelector('input[name="lengan"]:checked');
  const ukuranKaos = document.getElementById('ukuranKaos').value;

  if (!noHp)       return alert('No. HP wajib diisi.');
  if (!tanggal)    return alert('Pilihan tanggal wajib dipilih.');
  if (!kehadiran)  return alert('Kehadiran wajib dipilih.');
  if (!transport)  return alert('Transportasi wajib dipilih.');
  if (!lengan)     return alert('Model lengan wajib dipilih.');
  if (!ukuranKaos) return alert('Ukuran kaos wajib dipilih.');

  // Kumpulkan data anak
  const anak = [];
  for (let i = 0; i < anakCount; i++) {
    anak.push({
      nama: document.getElementById(`anak_nama_${i}`)?.value || '',
      usia: document.getElementById(`anak_usia_${i}`)?.value || ''
    });
  }

  const namaIstri   = document.getElementById('namaIstri').value.trim();
  const jumlahIstri = namaIstri ? 1 : 0;
  const totalDewasa = 1 + jumlahIstri;
  const totalAnak   = anakCount;
  const totalPeserta= totalDewasa + totalAnak;

  const payload = {
    nama        : currentKaryawan.name,
    nik         : currentKaryawan.noreg,
    section     : currentKaryawan.sec,
    noHp,
    tanggal,
    kehadiran   : kehadiran.value,
    jumlahIstri,
    namaIstri,
    totalDewasa,
    totalAnak,
    totalPeserta,
    anak,
    transportasi: transport.value,
    modelLengan : lengan.value,
    ukuranKaos,
    catatan     : document.getElementById('catatan').value.trim()
  };

  showOverlay('Menyimpan data...');
  document.getElementById('submitBtn').disabled = true;

  try {
    const res  = await fetch(SCRIPT_URL, {
      method : 'POST',
      body   : JSON.stringify(payload)
    });
    const json = await res.json();
    hideOverlay();

    if (json.status === 'created' || json.status === 'updated') {
      showSuccess(
        json.status === 'updated' ? '🔄 Data Diperbarui!' : '✅ Pendaftaran Berhasil!',
        json.status === 'updated'
          ? `Data ${currentKaryawan.name} berhasil diperbarui.`
          : `${currentKaryawan.name} berhasil didaftarkan. Sampai jumpa di tour! 🎉`
      );
    } else {
      alert('Gagal menyimpan: ' + (json.message || 'Unknown error'));
      document.getElementById('submitBtn').disabled = false;
    }
  } catch(e) {
    hideOverlay();
    alert('Gagal terhubung ke server. Cek koneksi internet.');
    document.getElementById('submitBtn').disabled = false;
  }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────
function showOverlay(msg) {
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}
function showSuccess(title, sub) {
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successSub').textContent   = sub;
  document.getElementById('mainForm').style.display   = 'none';
  document.getElementById('successScreen').classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}
function resetForm() {
  document.getElementById('successScreen').classList.remove('show');
  document.getElementById('mainForm').style.display = '';
  document.getElementById('nikInput').value = '';
  document.getElementById('nikStatus').className = 'nik-status';
  document.getElementById('identityCard').classList.remove('show');
  document.getElementById('formBody').classList.remove('show');
  document.getElementById('submitBtn').disabled = false;
  currentKaryawan = null;
  anakCount = 0;
  isRevisi  = false;
  document.getElementById('anakCount').textContent = 0;
  document.getElementById('anakWrap').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
